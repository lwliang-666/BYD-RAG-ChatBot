# docker-compose.yml - Docker Compose 编排配置
# 定义 PolarDB PostgreSQL 数据库服务，用于本地开发环境
# 包含数据库初始化脚本挂载和健康检查配置

services:
  polardb:
    # 使用 PolarDB-PG 本地实例镜像
    image: polardb/polardb_pg_local_instance:latest
    container_name: byd_rag_polardb
    # 容器异常退出时自动重启
    restart: unless-stopped
    ports:
      # 映射 PostgreSQL 默认端口到宿主机
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      # 持久化数据库数据
      - polardb_data:/var/libnssdb
      # 挂载初始化脚本：创建数据库
      - ./01-create-db.sh:/docker-entrypoint-initdb.d/01-create-db.sh
      # 挂载初始化脚本：建表
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # 健康检查：检测 byd_rag 数据库是否就绪
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d byd_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# 命名卷：持久化数据库数据，容器重建后数据不丢失
volumes:
  polardb_data:
